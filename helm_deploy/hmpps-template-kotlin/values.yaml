generic-service:
  nameOverride: hmpps-template-kotlin
  productId: "UNASSIGNED" # productId for the product that this belongs too, i.e. DPS001, see README.md for details

  replicaCount: 4

  image:
    repository: ghcr.io/ministryofjustice/hmpps-template-kotlin
    tag: app_version # override at deployment time
    port: 8080

  ingress:
    enabled: true
    host: app-hostname.local # override per environment
    tlsSecretName: hmpps-template-kotlin-cert

  # Environment variables to load into the deployment
  env:
    SERVER_PORT: "8080"
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: applicationinsights.json
    # JAVA_TOOL_OPTIONS is set in the base image (hmpps-eclipse-temurin) with:
    #   -XX:MaxRAMPercentage=50.0
    # Uncomment below to override memory settings if needed.
    # Check resources.limits.memory is set appropriately.
    #
    # Percentage-based example:
    #   JAVA_TOOL_OPTIONS: "-XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=75.0"
    #
    # Fixed memory example:
    #   JAVA_TOOL_OPTIONS: "-Xms512m -Xmx1024m"

  # Pre-existing kubernetes secrets to load as environment variables in the deployment.
  # namespace_secrets:
  #   [name of kubernetes secret]:
  #     [name of environment variable as seen by app]: [key of kubernetes secret to load]

  namespace_secrets:
    hmpps-template-kotlin-application-insights:
      APPLICATIONINSIGHTS_CONNECTION_STRING: "APPLICATIONINSIGHTS_CONNECTION_STRING"

  allowlist:
    groups:
      - internal
  # NOTE: If you intend to make this application accessible from the internet in any environment by clearing 
  #       the allowlist groups here or within an environment's values file, please ensure you uncomment the
  #       'modsecurity_enabled=true' entries in the corresponding environment value file.
  #       This will enable WAF protection of the endpoint. You may need to adapt modsecurity rules
  #       to suit your needs. Further information can be found here:
  #       https://user-guide.cloud-platform.service.justice.gov.uk/documentation/networking/modsecurity.html#modsecurity-web-application-firewall


generic-prometheus-alerts:
  targetApplication: hmpps-template-kotlin
